<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recargar Saldo - {{ usuario.user_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #001a33;
            color: white;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .card-recarga {
            background: #0f172a;
            border: 2px solid #FF8C00;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .form-control { background: white !important; color: black !important; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card-recarga">
        <h2 class="text-center mb-4" style="color: #FF8C00;">RECARGAR SALDO</h2>
        <p class="text-center">Usuario: <strong>{{ usuario.user_name }}</strong></p>
        <h3 class="text-center mb-4 text-warning">$ {{ "{:,.0f}".format(usuario.saldo_plan).replace(',', '.') }}</h3>
        
        <form action="/usuarios/procesar-recarga" method="POST">
            <input type="hidden" name="usuario_id" value="{{ usuario.id_usuario }}">
            
            <div class="mb-3">
                <label class="form-label">Monto a cargar ($)</label>
                <input type="number" name="monto" class="form-control form-control-lg" required autofocus>
            </div>
            
            <div class="mb-4">
                <label class="form-label">Concepto</label>
                <input type="text" name="concepto" class="form-control" value="Recarga manual Admin">
            </div>
            
            <button type="submit" class="btn btn-warning w-100 fw-bold py-2" style="background: #FF8C00; border: none; color: white;">CONFIRMAR RECARGA</button>
            <a href="/usuarios" class="btn btn-link w-100 text-white-50 mt-2 text-decoration-none">Volver atrás</a>
        </form>
    </div>
</body>
</html>
