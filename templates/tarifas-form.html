{# templates/tarifas-form.html #}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ 'Editar Tarifa' if tarifa and tarifa.id else 'Nueva Tarifa' }} | EnviExpress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<style>
        :root {
            /* Paleta de alto contraste definitiva */
            --milano-red:      #B20C06;
            --milano-hover:    #8E0A05;
            --chinese-black:   #0b012e;
            --slate-gray:      #738589;
            --white-bg:        #FDFFFF;
            --text-dark:       #0b012e;
            --text-light:      #ffffff;
            
            /* Inputs y contenedores claros */
            --card-bg:         #ffffff;
            --input-bg:        #f8fafc;
            --border-light:    rgba(11, 1, 46, 0.15);
        }
        body { 
            /* ⚪ Fondo blanco dominante */
            background: var(--white-bg);
            min-height: 100vh; 
            color: var(--text-dark); /* 🖤 Letras en negro */
            font-family: 'Montserrat', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            margin: 0;
        }
        .form-container { 
            max-width: 600px;
            width: 100%; 
            background: var(--card-bg); 
            border: 1px solid var(--border-light); 
            border-radius: 20px; 
            padding: 40px; 
            /* Sombras suaves para dar profundidad sobre el fondo blanco */
            box-shadow: 0 10px 30px rgba(11, 1, 46, 0.06);
        }
        .title-glow { 
            text-align: center; 
            font-size: 1.8rem; 
            font-weight: 800; 
            color: var(--text-dark); /* Título en negro */
            margin-bottom: 30px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        /* Destacados del texto pasan a Rojo Milano */
        .text-orange { color: var(--milano-red) !important; }
        
        .form-label { 
            color: var(--milano-red); /* Etiquetas en rojo */
            font-weight: 600; 
            margin-bottom: 8px; 
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        .form-control { 
            background: var(--input-bg); 
            border: 1px solid var(--border-light); 
            border-radius: 10px; 
            padding: 12px; 
            color: var(--text-dark); /* Texto digitado en negro */
            transition: 0.3s; 
        }
        .form-control:focus { 
            background: #ffffff; 
            border-color: var(--milano-red); /* Foco del input en rojo */
            box-shadow: 0 0 10px rgba(178, 12, 6, 0.15); 
            color: var(--text-dark); 
            outline: none;
        }
        textarea.form-control {
            min-height: 80px;
            resize: none;
        }
        /* 🔴 Botón guardar en rojo milano */
        .btn-save { 
            width: 100%; 
            padding: 15px; 
            background: var(--milano-red); 
            border: none; 
            border-radius: 12px; 
            color: var(--text-light); /* Letras del botón en blanco */
            font-weight: 700; 
            font-size: 1rem; 
            transition: 0.3s; 
            margin-top: 20px; 
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(178, 12, 6, 0.2);
            cursor: pointer;
        }
        .btn-save:hover { 
            background: var(--milano-hover); 
            transform: translateY(-2px); 
            box-shadow: 0 6px 15px rgba(142, 10, 5, 0.35);
            color: var(--text-light);
        }
        /* Botón secundario/cancelar adaptado */
        .btn-cancel { 
            width: 100%; 
            padding: 12px; 
            background: transparent; 
            border: 1px solid var(--border-light); 
            border-radius: 10px; 
            color: var(--slate-gray); /* Letras grises para menor peso visual */
            font-weight: 600; 
            transition: 0.3s; 
            margin-top: 15px; 
            text-decoration: none; 
            display: block; 
            text-align: center; 
            font-size: 0.9rem;
            cursor: pointer;
        }
        .btn-cancel:hover { 
            background: var(--input-bg); 
            color: var(--text-dark); /* Pasa a negro en hover */
            border-color: var(--milano-red);
        }
    </style>
</head>
<body>

<div class="form-container">
    <h1 class="title-glow">
        <i class="bi bi-pencil-square text-orange me-2"></i>
        {{ 'Editar Tarifa' if tarifa and tarifa.id else 'Nueva Tarifa' }}
    </h1>

    <form action="/tarifas/guardar" method="post">
        {% if tarifa and tarifa.id %}
        <input type="hidden" name="id" value="{{ tarifa.id }}">
        {% endif %}

        <div class="row">
            <div class="col-md-12 mb-4">
                <label for="nombre" class="form-label">
                    <i class="bi bi-tag-fill"></i> Nombre del Plan / Tarifa*
                </label>
                <input type="text" class="form-control" id="nombre" name="nombre"
                       value="{{ tarifa.nombre if tarifa else '' }}"
                       placeholder="Ej: Bronce, Plata, Diamante..."
                       required maxlength="50" />
            </div>

            <div class="col-md-6 mb-4">
                <label for="precio_plan" class="form-label">
                    <i class="bi bi-currency-dollar"></i> Valor por Envío ($)*
                </label>
                <input type="number" step="0.01" min="0" class="form-control"
                       id="precio_plan" name="precio_plan"
                       value="{{ tarifa.precio_plan if tarifa else '' }}"
                       placeholder="Ej: 11990" required />
            </div>

            <div class="col-md-6 mb-4">
                <label for="envios_incluidos" class="form-label">
                    <i class="bi bi-box-seam"></i> Envíos Incluidos*
                </label>
                <input type="number" min="0" class="form-control"
                       id="envios_incluidos" name="envios_incluidos"
                       value="{{ tarifa.envios_incluidos if tarifa else '' }}"
                       placeholder="Ej: 10" required />
            </div>

            <div class="col-md-12 mb-2">
                <label class="form-label opacity-50 small">
                    <i class="bi bi-calculator"></i> Total del Plan (calculado automáticamente)
                </label>
                <div class="form-control d-flex justify-content-between align-items-center"
                     style="background: rgba(255,140,0,0.08); border-color: rgba(255,140,0,0.3); cursor: default;">
                    <span class="opacity-75 small">Valor por envío × Envíos incluidos</span>
                    <span class="fw-bold text-warning" id="totalCalculado">$0</span>
                </div>
            </div>

            <div class="col-md-12 mb-4 mt-4">
                <label for="descripcion" class="form-label">
                    <i class="bi bi-info-circle-fill"></i> Descripción para el Cliente
                </label>
                <textarea class="form-control" id="descripcion" name="descripcion"
                          placeholder="Ej: Ideal para envíos ocasionales, rastreo en tiempo real...">{{ tarifa.descripcion if tarifa else '' }}</textarea>
            </div>
        </div>

        <button type="submit" class="btn-save">
            <i class="bi bi-save-fill"></i> Guardar Cambios
        </button>

        <a href="/tarifas" class="btn-cancel">
            <i class="bi bi-arrow-left-circle"></i> Cancelar y Volver
        </a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function calcularTotal() {
        const precio = parseFloat(document.getElementById('precio_plan').value) || 0;
        const envios = parseInt(document.getElementById('envios_incluidos').value) || 0;
        const total = precio * envios;
        document.getElementById('totalCalculado').textContent = '$' + total.toLocaleString('es-CO');
    }

    document.getElementById('precio_plan').addEventListener('input', calcularTotal);
    document.getElementById('envios_incluidos').addEventListener('input', calcularTotal);

    calcularTotal();
</script>
</body>
</html>
