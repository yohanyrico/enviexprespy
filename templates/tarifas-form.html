{# templates/tarifas-form.html #}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ 'Editar Tarifa' if tarifa and tarifa.id else 'Nueva Tarifa' }} | EnviExpress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #00235a;
            --primary-blue: #003a8c;
            --accent-orange: #ff8c00;
            --text-light: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(255, 255, 255, 0.1);
        }

        body { 
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-blue) 100%);
            min-height: 100vh; 
            color: var(--text-light); 
            font-family: 'Montserrat', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            margin: 0;
        }

        .form-container { 
            max-width: 500px; 
            width: 100%; 
            background: var(--card-bg); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 20px; 
            padding: 40px; 
            backdrop-filter: blur(15px); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .title-glow { 
            text-align: center; 
            font-size: 1.8rem; 
            font-weight: 800; 
            color: var(--text-light); 
            margin-bottom: 30px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .text-orange { color: var(--accent-orange) !important; }

        .form-label { 
            color: var(--accent-orange); 
            font-weight: 600; 
            margin-bottom: 8px; 
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .form-control { 
            background: var(--input-bg); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 10px; 
            padding: 12px; 
            color: white; 
            transition: 0.3s; 
        }

        .form-control:focus { 
            background: rgba(255, 255, 255, 0.15); 
            border-color: var(--accent-orange); 
            box-shadow: 0 0 15px rgba(255, 140, 0, 0.2); 
            color: white; 
        }

        .btn-save { 
            width: 100%; 
            padding: 15px; 
            background: var(--accent-orange); 
            border: none; 
            border-radius: 12px; 
            color: white; 
            font-weight: 700; 
            font-size: 1rem; 
            transition: 0.3s; 
            margin-top: 20px; 
            text-transform: uppercase;
        }

        .btn-save:hover { 
            background: #e67e00; 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(255, 140, 0, 0.4);
            color: white;
        }

        .btn-cancel { 
            width: 100%; 
            padding: 12px; 
            background: transparent; 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 10px; 
            color: white; 
            font-weight: 600; 
            transition: 0.3s; 
            margin-top: 15px; 
            text-decoration: none; 
            display: block; 
            text-align: center; 
            opacity: 0.8;
            font-size: 0.9rem;
        }

        .btn-cancel:hover { 
            background: rgba(255, 255, 255, 0.1); 
            color: white; 
            border-color: var(--accent-orange);
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h1 class="title-glow">
        <i class="bi bi-pencil-square text-orange me-2"></i>
        {{ 'Editar Tarifa' if tarifa and tarifa.id else 'Nueva Tarifa' }}
    </h1>

    <form action="/tarifas/guardar" method="post">
        <input type="hidden" name="id" value="{{ tarifa.id if tarifa and tarifa.id else '' }}" />

        <div class="mb-4">
            <label for="nombre" class="form-label">
                <i class="bi bi-tag-fill"></i> Nombre de la Tarifa*
            </label>
            <input type="text" class="form-control" id="nombre" name="nombre"
                   value="{{ tarifa.nombre if tarifa else '' }}"
                   placeholder="Ej: Oro, Plata, Nacional..."
                   required maxlength="50" />
        </div>

        <div class="mb-4">
            <label for="precio_kg" class="form-label">
                <i class="bi bi-cash-stack"></i> Precio por Kg ($)*
            </label>
            <input type="number" step="0.01" min="0" class="form-control"
                   id="precio_kg" name="precio_kg"
                   value="{{ tarifa.precio_kg if tarifa else '' }}"
                   placeholder="0.00" required />
        </div>

        <button type="submit" class="btn-save">
            <i class="bi bi-save-fill"></i> Guardar Cambios
        </button>

        <a href="/tarifas" class="btn-cancel">
            <i class="bi bi-arrow-left-circle"></i> Cancelar y Volver
        </a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
