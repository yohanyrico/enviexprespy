<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle Ruta | {{ mensajero.nombre }}</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: 'Montserrat', sans-serif; }
        .main-wrapper { display: flex; width: 100%; height: 100vh; }
        #map { flex: 1; height: 100%; background: #001a33; }
        
        #detail-panel { width: 400px; background: #fff; border-left: 2px solid #002b5b; display: flex; flex-direction: column; z-index: 1001; }
        .panel-header { padding: 20px; background: #002b5b; color: white; }
        .list-group-item { border-left: none; border-right: none; font-size: 0.85rem; border-bottom: 1px solid #eee; }
        .badge-guia { background: #ff8c00; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div id="map"></div>

        <div id="detail-panel">
            <div class="panel-header">
                <a href="/envios/planificar-ruta" class="text-white text-decoration-none small"><i class="bi bi-arrow-left"></i> Volver</a>
                <h5 class="mt-2 mb-0">Ruta: {{ mensajero.nombre }}</h5>
                <small class="opacity-75">Total: {{ envios|length }} pedidos</small>
            </div>
            
            <div class="p-3 bg-light border-bottom">
                <h6 class="mb-0 text-uppercase fw-bold text-secondary" style="font-size: 0.7rem;">Listado de Guías</h6>
            </div>

            <div class="flex-grow-1 overflow-auto">
                <ul class="list-group list-group-flush">
                    {% for e in envios %}
                    <li class="list-group-item p-3">
                        <div class="d-flex justify-content-between">
                            <span class="badge badge-guia mb-2">{{ e.numero_guia }}</span>
                            <small class="text-muted">{{ e.tipo_servicio }}</small>
                        </div>
                        <p class="mb-1"><b>Cliente:</b> {{ e.cliente.nombre }}</p>
                        <p class="mb-0 text-truncate"><i class="bi bi-geo-alt-fill text-danger"></i> {{ e.lugar_entrega.direccion }}</p>
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([4.6097, -74.0817], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const group = new L.featureGroup();

        {% for e in envios %}
            // Marcador de Entrega (D) únicamente para ver la ruta
            {% if e.lugar_entrega and e.lugar_entrega.latitud %}
                L.marker([{{ e.lugar_entrega.latitud }}, {{ e.lugar_entrega.longitud }}])
                    .addTo(group)
                    .bindPopup("<b>Guía: {{ e.numero_guia }}</b><br>{{ e.lugar_entrega.direccion }}");
            {% endif %}
        {% endfor %}

        group.addTo(map);
        if (group.getLayers().length > 0) {
            map.fitBounds(group.getBounds().pad(0.2));
        }
    </script>
</body>
</html>
