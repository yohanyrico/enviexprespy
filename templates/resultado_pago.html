<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Resultado del Pago - EnviExpress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #00235a; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        .result-card { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div class="result-card shadow">
        {% if aprobado %}
            <h1 class="text-success">✅ ¡Pago Aprobado!</h1>
            <p>Tu saldo ha sido cargado con éxito.</p>
        {% else %}
            <h1 class="text-danger">❌ Pago {{ status }}</h1>
            <p>Hubo un problema con la transacción.</p>
        {% endif %}
        
        <p class="small opacity-75">Referencia: {{ referencia }}</p>
        <br>
        <a href="/dashboard" class="btn btn-warning fw-bold">Ir a mi Panel</a>
    </div>
</body>
</html>
