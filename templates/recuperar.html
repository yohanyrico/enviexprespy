<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - EnvíExpress</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            border: 2px solid #000;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 { font-size: 26px; color: #000; }
        h1 span { color: #ff0000; }
        .divider { height: 2px; background: #ff0000; margin: 12px 0 24px; }
        h2 { font-size: 18px; color: #333; margin-bottom: 8px; }
        p.sub { font-size: 13px; color: #666; margin-bottom: 24px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
        input[type="email"] {
            width: 100%; padding: 10px 14px;
            border: 1px solid #ccc; border-radius: 5px;
            font-size: 14px; margin-bottom: 16px;
        }
        input[type="email"]:focus { border-color: #ff0000; outline: none; }
        button {
            width: 100%; padding: 12px;
            background-color: #ff0000; color: white;
            font-size: 15px; font-weight: bold;
            border: none; border-radius: 5px; cursor: pointer;
        }
        button:hover { background-color: #cc0000; }
        .mensaje {
            margin-top: 16px; padding: 10px 14px;
            border-radius: 5px; font-size: 13px; display: none;
        }
        .mensaje.error { background: #ffe0e0; color: #cc0000; border: 1px solid #ff0000; }
        .mensaje.success { background: #e0ffe0; color: #006600; border: 1px solid #00aa00; }
        .back { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: #666; text-decoration: none; }
        .back:hover { color: #ff0000; }
    </style>
</head>
<body>
    <div class="card">
        <h1>EnvíExpress <span>Bogotá</span></h1>
        <div class="divider"></div>
        <h2>Recuperar Contraseña</h2>
        <p class="sub">Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.</p>

        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="tucorreo@gmail.com">

        <button onclick="enviar()">ENVIAR ENLACE</button>

        <div id="mensaje" class="mensaje"></div>
        <a href="/login" class="back">← Volver al inicio de sesión</a>
    </div>

    <script>
        async function enviar() {
            const email = document.getElementById("email").value.trim();
            if (!email) return mostrarMensaje("Ingresa tu correo.", "error");

            const response = await fetch(`/recuperar?email=${encodeURIComponent(email)}`, {
                method: "POST"
            });

            const data = await response.json();
            if (response.ok) {
                mostrarMensaje("✅ " + data.message, "success");
            } else {
                mostrarMensaje(data.detail || "Error al enviar.", "error");
            }
        }

        function mostrarMensaje(texto, tipo) {
            const el = document.getElementById("mensaje");
            el.textContent = texto;
            el.className = `mensaje ${tipo}`;
            el.style.display = "block";
        }
    </script>
</body>
</html>
