{# templates/registro.html #}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro – EnviExpress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
    :root {
        --azul-rey: #0046ad;
        --azul-oscuro: #002d70;
        --naranja: #ff7b00;
        --naranja-hover: #e66f00;
        --blanco: #ffffff;
        --gris-claro: #f8fafc;
        --texto-suave: #64748b;
    }

    body { 
        background: linear-gradient(135deg, var(--azul-oscuro), var(--azul-rey), #005ce6); 
        min-height: 100vh; 
        color: var(--blanco); 
        font-family: 'Montserrat', sans-serif; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        padding: 20px; 
        margin: 0;
    }

    /* CONTENEDOR - Ahora blanco para un look más "limpio" */
    .registro-container { 
        max-width: 600px; 
        width: 100%; 
        background: var(--blanco); 
        border: none; 
        border-radius: 20px; 
        padding: 40px; 
        box-shadow: 0 15px 35px rgba(0,0,0,0.25); 
        color: var(--azul-oscuro);
    }

    .title-glow { 
        text-align: center; 
        font-size: 2.5rem; 
        font-weight: 800; 
        color: var(--azul-rey); 
        margin-bottom: 10px; 
        text-shadow: none; /* Estilo corporativo sin brillo */
    }

    .subtitle { 
        text-align: center; 
        color: var(--texto-suave); 
        margin-bottom: 30px; 
        font-weight: 500;
    }

    /* FORMULARIOS */
    .form-label { 
        color: var(--azul-rey); 
        font-weight: 600; 
        margin-bottom: 8px; 
        display: block;
    }

    .form-control { 
        background: var(--gris-claro); 
        border: 2px solid #e2e8f0; 
        border-radius: 12px; 
        padding: 14px; 
        color: var(--azul-oscuro); 
        transition: 0.3s; 
        width: 100%;
        box-sizing: border-box;
    }

    .form-control::placeholder { 
        color: #94a3b8; 
    }

    .form-control:focus { 
        outline: none;
        background: var(--blanco); 
        border-color: var(--azul-rey); 
        box-shadow: 0 0 0 4px rgba(0, 70, 173, 0.1); 
        color: var(--azul-oscuro); 
    }

    /* BOTÓN REGISTRO - Naranja para llamar la atención */
    .btn-registro { 
        width: 100%; 
        padding: 15px; 
        background: var(--naranja); 
        border: none; 
        border-radius: 12px; 
        color: var(--blanco); 
        font-weight: 700; 
        font-size: 1.1rem; 
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: 0.3s; 
        margin-top: 20px; 
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(255, 123, 0, 0.3);
    }

    .btn-registro:hover { 
        background: var(--naranja-hover); 
        transform: translateY(-2px); 
        box-shadow: 0 6px 20px rgba(255, 123, 0, 0.4);
    }

    /* LINKS */
    .login-link { 
        text-align: center; 
        margin-top: 25px; 
        color: var(--texto-suave); 
    }

    .login-link a { 
        color: var(--azul-rey); 
        text-decoration: none; 
        font-weight: 700; 
    }

    .login-link a:hover { 
        text-decoration: underline; 
    }

    .back-link { 
        text-align: center; 
        margin-bottom: 25px; 
    }

    .back-link a { 
        color: var(--blanco); 
        text-decoration: none; 
        font-weight: 500;
        transition: 0.3s; 
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .back-link a:hover { 
        color: var(--naranja); 
    }

    @media (max-width: 480px) {
        .registro-container { padding: 25px; }
        .title-glow { font-size: 1.8rem; }
    }
</style>
</head>
<body>

<div class="registro-container">
    <div class="back-link">
        <a href="/"><i class="bi bi-arrow-left"></i> Volver al inicio</a>
    </div>

    <h1 class="title-glow"><i class="bi bi-person-plus"></i> Registro</h1>
    <p class="subtitle">Crea tu cuenta en EnviExpress</p>

    <!-- Equivalente a th:action="@{/registro/guardar}" th:object="${usuario}" -->
    <form action="/registro/guardar" method="post">

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="nombre" class="form-label">
                    <i class="bi bi-person"></i> Nombre*
                </label>
                <!-- Equivalente a th:field="*{nombre}" -->
                <input type="text" class="form-control" name="nombre" id="nombre"
                       placeholder="Tu nombre" required maxlength="100" />
            </div>
            <div class="col-md-6 mb-3">
                <label for="apellido" class="form-label">
                    <i class="bi bi-person"></i> Apellido*
                </label>
                <input type="text" class="form-control" name="apellido" id="apellido"
                       placeholder="Tu apellido" required maxlength="100" />
            </div>
        </div>

        <div class="mb-3">
            <label for="userName" class="form-label">
                <i class="bi bi-person-badge"></i> Nombre de Usuario*
            </label>
            <input type="text" class="form-control" name="user_name" id="userName"
                   placeholder="usuario123" required maxlength="255" />
        </div>

        <div class="mb-3">
            <label for="correo" class="form-label">
                <i class="bi bi-envelope"></i> Correo Electrónico*
            </label>
            <input type="email" class="form-control" name="correo" id="correo"
                   placeholder="correo@ejemplo.com" required maxlength="120" />
        </div>

        <div class="mb-3">
            <label for="telefono" class="form-label">
                <i class="bi bi-telephone"></i> Teléfono
            </label>
            <input type="tel" class="form-control" name="telefono" id="telefono"
                   placeholder="3001234567" maxlength="20" />
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">
                <i class="bi bi-key"></i> Contraseña*
            </label>
            <input type="password" class="form-control" name="password" id="password"
                   placeholder="Mínimo 6 caracteres" required minlength="6" />
        </div>

        <button type="submit" class="btn-registro">
            <i class="bi bi-check-circle"></i> Crear Cuenta
        </button>
    </form>

    <div class="login-link">
        ¿Ya tienes cuenta?
        <a href="/login">Inicia sesión aquí</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
