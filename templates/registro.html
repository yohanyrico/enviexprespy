{# templates/registro.html #}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro – EnviExpress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
    :root {
        /* Paleta de colores actualizada */
        --fondo-pagina: #ffffff;
        --contenedor-blanco: #738589;
        --rojo-primario: #e20707;
        --rojo-hover: #cc0000;
        --blanco: #050505;
        --negro-titulo: #000000;
        --texto-cuerpo: #ffffff; /* Texto sobre el fondo azul de la página */
        --texto-formulario: #000000; /* Texto dentro del contenedor blanco */
    }

    body { 
        background: linear-gradient(135deg, #ffffff, #ffffff, #f7f8fa); 
        min-height: 100vh; 
        color: var(--texto-cuerpo); 
        font-family: 'Montserrat', sans-serif; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        padding: 20px; 
        margin: 0;
    }

    /* CONTENEDOR - Blanco Limpio */
    .registro-container { 
        max-width: 600px; 
        width: 100%; 
        background: var(--contenedor-blanco); 
        border-radius: 20px; 
        padding: 40px; 
        box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
        color: var(--texto-formulario);
    }

    /* TÍTULOS EN NEGRO */
    .title-glow { 
        text-align: center; 
        font-size: 2.5rem; 
        font-weight: 800; 
        color: var(--negro-titulo); 
        margin-bottom: 10px; 
    }

    .subtitle { 
        text-align: center; 
        color: #000000; 
        margin-bottom: 30px; 
        font-weight: 500;
    }

    /* ETIQUETAS DE FORMULARIO */
    .form-label { 
        color: var(--negro-titulo); 
        font-weight: 600; 
        margin-bottom: 8px; 
        display: block;
    }

    .form-control { 
        background: #f8fafc; 
        border: 2px solid #4d4d4d; 
        border-radius: 12px; 
        padding: 14px; 
        color: #000; 
        transition: 0.3s; 
        width: 100%;
        box-sizing: border-box;
    }

    /* BOTÓN ROJO CON BORDE BLANCO */
    .btn-registro { 
        width: 100%; 
        padding: 15px; 
        background: var(--rojo-primario); 
        border: 2px solid var(--blanco); /* Borde blanco */
        border-radius: 12px; 
        color: var(--blanco); 
        font-weight: 700; 
        font-size: 1.1rem; 
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: 0.3s; 
        margin-top: 20px; 
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .btn-registro:hover { 
        background: var(--rojo-hover); 
        transform: translateY(-2px); 
        border-color: var(--blanco);
    }

    /* TEXTOS EN BLANCO (Fuera del contenedor principal) */
    .back-link a { 
        color: var(--blanco); 
        text-decoration: none; 
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .login-link { 
        text-align: center; 
        margin-top: 25px; 
        color: #444444; /* Texto oscuro para que se vea en el fondo blanco */
    }

    .login-link a { 
        color: var(--rojo-primario); 
        text-decoration: none; 
        font-weight: 700; 
    }

    @media (max-width: 480px) {
        .registro-container { padding: 25px; }
        .title-glow { font-size: 1.8rem; }
    }
</style>
</head>
<body>

<div class="registro-container">
    <div class="back-link">
        <a href="/"><i class="bi bi-arrow-left"></i> Volver al inicio</a>
    </div>

    <h1 class="title-glow"><i class="bi bi-person-plus"></i> Registro</h1>
    <p class="subtitle">Crea tu cuenta en EnviExpress</p>

    <!-- Equivalente a th:action="@{/registro/guardar}" th:object="${usuario}" -->
    <form action="/registro/guardar" method="post">

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="nombre" class="form-label">
                    <i class="bi bi-person"></i> Nombre*
                </label>
                <!-- Equivalente a th:field="*{nombre}" -->
                <input type="text" class="form-control" name="nombre" id="nombre"
                    placeholder="Tu nombre" required maxlength="100" />
            </div>
            <div class="col-md-6 mb-3">
                <label for="apellido" class="form-label">
                    <i class="bi bi-person"></i> Apellido*
                </label>
                <input type="text" class="form-control" name="apellido" id="apellido"
                    placeholder="Tu apellido" required maxlength="100" />
            </div>
        </div>

        <div class="mb-3">
            <label for="userName" class="form-label">
                <i class="bi bi-person-badge"></i> Nombre de Usuario*
            </label>
            <input type="text" class="form-control" name="user_name" id="userName"
                placeholder="usuario123" required maxlength="255" />
        </div>
        <div class="mb-3">
            <label for="direccion" class="form-label">
                <i class="bi bi-geo-alt"></i> Dirección
            </label>
            <input type="text" class="form-control" name="direccion" id="direccion"
                placeholder="Calle 123 #45-67, Ciudad" maxlength="255" />
        </div>
        <div class="mb-3">
            <label for="ciudad" class="form-label">
                <i class="bi bi-geo-alt"></i> Ciudad
            </label>
            <input type="text" class="form-control" name="ciudad" id="ciudad"
                placeholder="Ciudad de residencia" maxlength="100" />
        </div>

        <div class="mb-3">
            <label for="Localidad" class="form-label">
                <i class="bi bi-geo-alt"></i> Localidad
            </label>
            <input type="text" class="form-control" name="Localidad" id="Localidad"
                placeholder="Localidad de residencia" maxlength="100" />
        </div>

        <div class="mb-3">
            <label for="correo" class="form-label">
                <i class="bi bi-envelope"></i> Correo Electrónico*
            </label>
            <input type="email" class="form-control" name="correo" id="correo"
                   placeholder="correo@ejemplo.com" required maxlength="120" />
        </div>

        <div class="mb-3">
            <label for="telefono" class="form-label">
                <i class="bi bi-telephone"></i> Teléfono
            </label>
            <input type="tel" class="form-control" name="telefono" id="telefono"
                   placeholder="3001234567" maxlength="20" />
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">
                <i class="bi bi-key"></i> Contraseña*
            </label>
            <input type="password" class="form-control" name="password" id="password"
                   placeholder="Mínimo 6 caracteres" required minlength="6" />
        </div>

        <button type="submit" class="btn-registro">
            <i class="bi bi-check-circle"></i> Crear Cuenta
        </button>
    </form>

    <div class="login-link">
        ¿Ya tienes cuenta?
        <a href="/login">Inicia sesión aquí</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
