{# templates/pago.html #}
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pago – EnviExpress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
    <style>
      :root {
        /* Paleta de colores ENVIEXPRESS */
        --rojo-milan: #b20c06;
        --rojo-hover: #8a0a05;
        --negro-puro: #000000;
        --blanco-puro: #ffffff;
        --fondo-gris: #f4f4f4;
        --card-bg: #ffffff;
        --input-bg: #fdfdfd;
      }
      
      body {
        background-color: var(--fondo-gris); /* Fondo gris claro limpio */
        min-height: 100vh;
        color: var(--negro-puro); /* Texto principal en negro legible */
        font-family: 'Montserrat', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
      }
      
      .payment-card {
        background: var(--card-bg); /* Contenedor de pago blanco puro */
        border-radius: 20px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        padding: 30px;
        width: 100%;
        max-width: 500px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.06); /* Sombra suave */
      }
      
      .method-card {
        background: var(--input-bg); /* Fondo sutil para las opciones */
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 15px;
        cursor: pointer;
        border: 2px solid rgba(0, 0, 0, 0.05);
        transition: all 0.3s ease;
        color: var(--negro-puro);
      }
      
      .method-card:hover {
        border-color: var(--rojo-milan);
        background: rgba(178, 12, 6, 0.03);
      }
      
      .method-selected {
        border-color: var(--rojo-milan) !important;
        background: rgba(178, 12, 6, 0.06) !important;
        font-weight: 600;
      }
      
      .cuota-badge {
        background: rgba(0, 0, 0, 0.04); /* Gris neutro sutil para resaltar datos de cuota */
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 8px;
        padding: 8px 12px;
        color: var(--negro-puro);
      }
    </style>
  </head>
  <body>
    <div class="payment-card shadow-lg">
      <h3 class="text-center fw-bold mb-4">Resumen de Compra</h3>

      <div class="d-flex justify-content-between mb-2">
        <span>Plan Seleccionado:</span>
        <span class="fw-bold text-uppercase">{{ plan }}</span>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-3 cuota-badge">
        <span class="opacity-75 small"><i class="bi bi-box-seam me-1"></i>Valor por envío:</span>
        <span class="fw-bold text-info">${{ cuota }}</span>
      </div>

      <hr style="border-color: rgba(255,255,255,0.15);" />

      <div class="d-flex justify-content-between mb-4 fs-4">
        <span>Total a pagar:</span>
        <span class="fw-bold text-warning">${{ precio }}</span>
      </div>

      <h6 class="mb-3 opacity-75">Selecciona tu método de pago:</h6>

      <div class="method-card d-flex align-items-center gap-3" onclick="seleccionarMetodo(this, 'tarjeta')">
        <i class="bi bi-credit-card fs-3"></i>
        <span>Tarjeta de Crédito / Débito</span>
      </div>
      <div class="method-card d-flex align-items-center gap-3" onclick="seleccionarMetodo(this, 'pse')">
        <i class="bi bi-bank fs-3"></i>
        <span>Transferencia PSE</span>
      </div>
      <div class="method-card d-flex align-items-center gap-3" onclick="seleccionarMetodo(this, 'billetera')">
        <i class="bi bi-wallet2 fs-3"></i>
        <span>Nequi / Daviplata</span>
      </div>

      <input type="hidden" id="inputMetodo" />

      <div class="mt-4">
        <!-- ✅ El botón redirige directo a Wompi, sin popup, sin bloqueo de Chrome -->
        <button type="button" class="btn btn-warning w-100 fw-bold py-3" onclick="procesarPago()">CONFIRMAR PAGO</button>
        <a href="/planes/detallado/{{ plan }}" class="btn btn-link text-white w-100 mt-2 text-decoration-none small">Regresar</a>
      </div>
    </div>

    <script>
      // Datos inyectados desde FastAPI
      const WOMPI_KEY = '{{ wompi_public_key }}'
      const MONTO_CENTAVOS = '{{ precio_centavos }}'
      const REFERENCIA = '{{ referencia }}'
      const FIRMA_INTEGRIDAD = '{{ firma_integridad }}' // 👈 NUEVO: hash calculado en el backend
      const REDIRECT_URL = 'https://matcher-zoom-deploy.ngrok-free.dev/planes/resultado-pago'
      
      let elementoSeleccionado = null
      
      function seleccionarMetodo(elemento, metodo) {
        if (elementoSeleccionado) {
          elementoSeleccionado.classList.remove('method-selected')
        }
        elemento.classList.add('method-selected')
        elementoSeleccionado = elemento
        document.getElementById('inputMetodo').value = metodo
      }
      
      function procesarPago() {
        const metodo = document.getElementById('inputMetodo').value
        if (!metodo) {
          alert('Por favor, selecciona un método de pago antes de continuar.')
          return
        }
      
        if (!FIRMA_INTEGRIDAD) {
          alert('Error interno: no se pudo generar la firma de integridad. Contacta soporte.')
          console.error('FIRMA_INTEGRIDAD vacía. Verifica que el backend la esté enviando al template.')
          return
        }
      
        // ✅ Redirige directo al checkout de Wompi — sin popup, sin bloqueo
        const url = 'https://checkout.wompi.co/p/' + '?public-key=' + encodeURIComponent(WOMPI_KEY) + '&currency=COP' + '&amount-in-cents=' + MONTO_CENTAVOS + '&reference=' + encodeURIComponent(REFERENCIA) + '&signature:integrity=' + encodeURIComponent(FIRMA_INTEGRIDAD) + '&redirect-url=' + encodeURIComponent(REDIRECT_URL)
      
        window.location.href = url
      }
    </script>
  </body>
</html>
