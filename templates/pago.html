{# templates/pago.html #}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago – EnviExpress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #00235a 0%, #003a8c 100%);
            min-height: 100vh; color: white; font-family: 'Montserrat', sans-serif;
            display: flex; align-items: center; justify-content: center;
            margin: 0;
        }
        .payment-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px; width: 100%; max-width: 500px;
        }
        .method-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px; padding: 15px; margin-bottom: 10px;
            cursor: pointer; border: 2px solid transparent; transition: 0.3s;
        }
        .method-card:hover { border-color: #ff8c00; background: rgba(255, 140, 0, 0.1); }
        
        /* Clase para marcar el método seleccionado */
        .method-selected {
            border-color: #ff8c00 !important;
            background: rgba(255, 140, 0, 0.2) !important;
        }
    </style>
</head>
<body>
    <div class="payment-card shadow-lg">
        <h3 class="text-center fw-bold mb-4">Resumen de Compra</h3>
        <div class="d-flex justify-content-between mb-2">
            <span>Plan Seleccionado:</span>
            <span class="fw-bold text-uppercase">{{ plan }}</span>
        </div>
        <div class="d-flex justify-content-between mb-4 fs-4">
            <span>Total a pagar:</span>
            <span class="fw-bold text-warning">${{ precio }}</span>
        </div>

        <h6 class="mb-3 opacity-75">Selecciona tu método de pago:</h6>
        
        <div class="method-card d-flex align-items-center gap-3" onclick="seleccionarMetodo(this, 'tarjeta')">
            <i class="bi bi-credit-card fs-3"></i>
            <span>Tarjeta de Crédito / Débito</span>
        </div>
        <div class="method-card d-flex align-items-center gap-3" onclick="seleccionarMetodo(this, 'pse')">
            <i class="bi bi-bank fs-3"></i>
            <span>Transferencia PSE</span>
        </div>
        <div class="method-card d-flex align-items-center gap-3" onclick="seleccionarMetodo(this, 'billetera')">
            <i class="bi bi-wallet2 fs-3"></i>
            <span>Nequi / Daviplata</span>
        </div>

        <form id="formConfirmarPago" action="/planes/confirmar" method="POST" style="display: none;">
            <input type="hidden" name="plan" value="{{ plan }}">
            <input type="hidden" name="precio" value="{{ precio }}">
            <input type="hidden" name="metodo_pago" id="inputMetodo">
        </form>

        <div class="mt-4">
            <button type="button" class="btn btn-warning w-100 fw-bold py-3" onclick="procesarPago()">
                CONFIRMAR PAGO
            </button>
            <a href="/planes/detallado/{{ plan }}" class="btn btn-link text-white w-100 mt-2 text-decoration-none small">
                Regresar
            </a>
        </div>
    </div>

    <script>
        let elementoSeleccionado = null;

        function seleccionarMetodo(elemento, metodo) {
            // Quitar clase al anterior
            if (elementoSeleccionado) {
                elementoSeleccionado.classList.remove('method-selected');
            }
            
            // Agregar clase al nuevo
            elemento.classList.add('method-selected');
            elementoSeleccionado = elemento;
            
            // Guardar el valor en el input oculto
            document.getElementById('inputMetodo').value = metodo;
        }

        function procesarPago() {
            const metodo = document.getElementById('inputMetodo').value;
            
            if (!metodo) {
                alert("Por favor, selecciona un método de pago antes de continuar.");
                return;
            }

            // Ejecutamos el envío del formulario oculto por método POST
            console.log("Enviando formulario de pago...");
            document.getElementById('formConfirmarPago').submit();
        }
    </script>
</body>
</html>
