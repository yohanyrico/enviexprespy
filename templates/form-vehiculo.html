{# templates/form-vehiculo.html #}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Vehículo – EnviExpress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
    :root {
        /* Paleta de colores memorizada */
        --rojo-milan: #B20C06;
        --rojo-hover: #8a0a05;
        --negro-puro: #000000;
        --blanco-puro: #ffffff;
        --fondo-gris: #f4f4f4;
        --card-bg: #ffffff; 
        --texto-gris: #4a5568;
    }

    body { 
        background-color: var(--fondo-gris); 
        min-height: 100vh; 
        color: var(--negro-puro); 
        font-family: 'Montserrat', sans-serif; 
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 20px;
    }

    /* CONTENEDOR DEL FORMULARIO (CARD BLANCA) */
    .form-container { 
        max-width: 600px; 
        width: 100%;
        margin: 20px auto; 
        padding: 40px; 
        background-color: var(--card-bg); 
        border-radius: 15px; 
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); 
        color: var(--negro-puro);
        border: 1px solid rgba(0, 0, 0, 0.1);
    }

    h2 { 
        color: var(--rojo-milan); 
        text-align: center; 
        margin-bottom: 30px; 
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: -0.5px;
    }

    /* ESTILO DE LOS CAMPOS (INPUTS Y SELECT) */
    .form-label {
        font-weight: 600;
        color: var(--negro-puro);
        margin-bottom: 8px;
    }

    .form-control, .form-select {
        border: 2px solid #e1e8ef;
        border-radius: 10px;
        padding: 12px;
        transition: 0.3s;
        font-weight: 500;
        color: var(--negro-puro) !important;
    }

    .form-control:focus, .form-select:focus {
        border-color: var(--rojo-milan);
        box-shadow: 0 0 0 0.25rem rgba(178, 12, 6, 0.1);
        outline: none;
    }

    /* BOTÓN PRINCIPAL - ROJO MILÁN */
    .btn-primary { 
        background-color: var(--rojo-milan); 
        border: none; 
        padding: 14px 20px;
        border-radius: 10px;
        font-weight: 700;
        width: 100%;
        color: var(--blanco-puro) !important;
        text-transform: uppercase;
        transition: 0.3s;
        cursor: pointer;
    }

    .btn-primary:hover { 
        background-color: var(--rojo-hover); 
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(178, 12, 6, 0.4);
    }

    /* BOTÓN CANCELAR REESTILIZADO */
    .btn-secondary {
        border-radius: 10px;
        padding: 12px 20px;
        font-weight: 600;
    }

    /* ENLACES Y TEXTOS SUTILES */
    .text-muted {
        color: var(--texto-gris) !important;
    }
</style>
</head>
<body>
<div class="container">
    <div class="form-container">
        <h2>
            <i class="bi bi-truck"></i>
            {{ 'Editar Vehículo' if vehiculo and vehiculo.vehiculo_id else 'Nuevo Vehículo' }}
        </h2>

        <form action="/vehiculos/guardar" method="post">

            <input type="hidden" name="vehiculo_id"
                   value="{{ vehiculo.vehiculo_id if vehiculo and vehiculo.vehiculo_id else '' }}" />

            <div class="mb-3">
                <label for="placa" class="form-label">
                    <i class="bi bi-credit-card-2-front"></i> Placa:
                </label>
                <input type="text" class="form-control" name="placa" id="placa"
                       value="{{ vehiculo.placa if vehiculo else '' }}"
                       placeholder="Ej: ABC123" required maxlength="20" />
            </div>

            <div class="mb-3">
                <label for="tipo" class="form-label">
                    <i class="bi bi-tag"></i> Tipo de Vehículo:
                </label>
                <select class="form-select" name="tipo" id="tipo" required>
                    <option value="">Seleccione un tipo</option>
                    {% for t in tipos %}
                    <option value="{{ t }}"
                        {{ 'selected' if vehiculo and vehiculo.tipo == t else '' }}>
                        {{ t }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="capacidad_kg" class="form-label">
                    <i class="bi bi-box-seam"></i> Capacidad de Carga (kg):
                </label>
                <input type="number" class="form-control" name="capacidad_kg" id="capacidad_kg"
                       value="{{ vehiculo.capacidad_kg if vehiculo else '' }}"
                       placeholder="Ej: 500" required step="0.01" min="0" />
                <small class="form-text text-muted d-block mt-1">Ingrese la capacidad máxima en kilogramos</small>
            </div>

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="bi bi-save"></i> Guardar
                </button>
                <a href="/vehiculos" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
