<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - EnvíExpress</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            border: 2px solid #000;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 { font-size: 26px; color: #000; margin-bottom: 4px; }
        h1 span { color: #ff0000; }
        .divider { height: 2px; background: #ff0000; margin: 12px 0 24px; }
        h2 { font-size: 18px; color: #333; margin-bottom: 8px; }
        p.sub { font-size: 13px; color: #666; margin-bottom: 24px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
        input[type="password"] {
            width: 100%; padding: 10px 14px;
            border: 1px solid #ccc; border-radius: 5px;
            font-size: 14px; margin-bottom: 16px;
        }
        input[type="password"]:focus { border-color: #ff0000; outline: none; }
        button {
            width: 100%; padding: 12px;
            background-color: #ff0000; color: white;
            font-size: 15px; font-weight: bold;
            border: none; border-radius: 5px; cursor: pointer;
        }
        button:hover { background-color: #cc0000; }
        .mensaje {
            margin-top: 16px; padding: 10px 14px;
            border-radius: 5px; font-size: 13px; display: none;
        }
        .mensaje.error { background: #ffe0e0; color: #cc0000; border: 1px solid #ff0000; }
        .mensaje.success { background: #e0ffe0; color: #006600; border: 1px solid #00aa00; }
        .back { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: #666; text-decoration: none; }
        .back:hover { color: #ff0000; }
    </style>
</head>
<body>
    <div class="card">
        <h1>EnvíExpress <span>Bogotá</span></h1>
        <div class="divider"></div>
        <h2>Nueva Contraseña</h2>
        <p class="sub">Ingresa tu nueva contraseña. El enlace expira en 15 minutos.</p>

        <div id="formSection">
            <label for="nueva">Nueva contraseña</label>
            <input type="password" id="nueva" placeholder="Mínimo 6 caracteres">

            <label for="confirmar">Confirmar contraseña</label>
            <input type="password" id="confirmar" placeholder="Repite la contraseña">

            <button onclick="resetear()">ACTUALIZAR CONTRASEÑA</button>
        </div>

        <div id="mensaje" class="mensaje"></div>
        <a href="/login" class="back">← Volver al inicio de sesión</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");

        if (!token) {
            document.getElementById("formSection").style.display = "none";
            mostrarMensaje("El enlace es inválido o ha expirado.", "error");
        }

        async function resetear() {
            const nueva = document.getElementById("nueva").value.trim();
            const confirmar = document.getElementById("confirmar").value.trim();

            if (!nueva || !confirmar) return mostrarMensaje("Completa ambos campos.", "error");
            if (nueva.length < 6) return mostrarMensaje("Mínimo 6 caracteres.", "error");
            if (nueva !== confirmar) return mostrarMensaje("Las contraseñas no coinciden.", "error");

            try {
                const response = await fetch(`/reset-password?token=${token}&nueva_clave=${encodeURIComponent(nueva)}`, {
                    method: "POST"
                });
                const data = await response.json();

                if (response.ok) {
                    mostrarMensaje("✅ Contraseña actualizada. Redirigiendo...", "success");
                    document.getElementById("formSection").style.display = "none";
                    setTimeout(() => window.location.href = "/login", 2500);
                } else {
                    mostrarMensaje(data.detail || "El enlace ha expirado.", "error");
                }
            } catch (err) {
                mostrarMensaje("Error de conexión. Intenta de nuevo.", "error");
            }
        }

        function mostrarMensaje(texto, tipo) {
            const el = document.getElementById("mensaje");
            el.textContent = texto;
            el.className = `mensaje ${tipo}`;
            el.style.display = "block";
        }
    </script>
</body>
</html>
