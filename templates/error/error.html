{# templates/error/error.html #}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Error - EnviExpress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-dark: #00235a;
            --primary-blue: #003a8c;
            --accent-orange: #ff8c00;
            --text-light: #ffffff;
        }

        body { 
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-blue) 100%);
            min-height: 100vh; 
            color: var(--text-light); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0;
        }

        .error-container { 
            text-align: center; 
            max-width: 650px; 
            width: 90%;
            padding: 50px 40px; 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 25px; 
            box-shadow: 0 20px 45px rgba(0,0,0,0.4);
        }

        .error-code { 
            font-size: 8rem; 
            font-weight: 900; 
            color: var(--accent-orange); 
            text-shadow: 0 0 25px rgba(255, 140, 0, 0.5); 
            margin: 0; 
            line-height: 1;
            letter-spacing: -2px;
        }

        .error-title { 
            font-size: 2rem; 
            font-weight: 700;
            color: var(--text-light); 
            margin: 25px 0; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .error-message { 
            font-size: 1.15rem; 
            margin-bottom: 35px; 
            color: rgba(255, 255, 255, 0.75);
            line-height: 1.6;
        }

        .btn-home { 
            background: var(--accent-orange); 
            border: none; 
            padding: 15px 35px; 
            color: white; 
            font-weight: 700; 
            border-radius: 12px; 
            text-decoration: none; 
            display: inline-block; 
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 5px 15px rgba(255, 140, 0, 0.3);
        }

        .btn-home:hover { 
            transform: scale(1.05);
            background: #e67e00; 
            color: white; 
            box-shadow: 0 8px 25px rgba(255, 140, 0, 0.5);
        }

        .btn-back-custom {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 15px 30px;
            color: white;
            font-weight: 600;
            border-radius: 12px;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }

        .btn-back-custom:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border-color: var(--text-light);
        }

        .icon-box {
            font-size: 2.5rem;
            color: var(--accent-orange);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="error-code">{{ status or 'ERR' }}</h1>
        
        <div class="icon-box">
            <i class="bi bi-exclamation-circle-fill"></i>
        </div>

        <h2 class="error-title">Interrupción de Servicio</h2>
        
        <p class="error-message">
            {{ error or 'Detectamos una inconsistencia en la ruta de procesamiento. Por favor, intenta de nuevo o contacta al centro de despacho.' }}
        </p>

        <div class="d-flex flex-column flex-sm-row justify-content-center gap-3 mt-4">
            <a href="javascript:history.back()" class="btn-back-custom">
                <i class="bi bi-arrow-left"></i> Reintentar
            </a>
            <a href="/" class="btn-home">
                <i class="bi bi-house-door-fill"></i> Panel de Control
            </a>
        </div>
    </div>
</body>
</html>
