<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Página no encontrada - EnviExpress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-dark: #00235a;
            --primary-blue: #003a8c;
            --accent-orange: #ff8c00;
            --text-light: #ffffff;
        }

        body {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-blue) 100%);
            min-height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .error-container {
            text-align: center;
            max-width: 600px;
            width: 90%;
            padding: 50px 40px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .error-code {
            font-size: 9rem;
            font-weight: 900;
            color: var(--accent-orange);
            text-shadow: 0 0 25px rgba(255, 140, 0, 0.4);
            margin: 0;
            line-height: 1;
        }

        .error-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-light);
            margin: 20px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .error-message {
            font-size: 1.1rem;
            margin-bottom: 35px;
            color: rgba(255, 255, 255, 0.7);
        }

        .btn-home {
            background: var(--accent-orange);
            border: none;
            padding: 14px 35px;
            color: white;
            font-weight: 700;
            border-radius: 12px;
            text-decoration: none;
            display: inline-block;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 140, 0, 0.3);
        }

        .btn-home:hover {
            transform: translateY(-3px);
            background: #e67e00;
            color: white;
            box-shadow: 0 8px 20px rgba(255, 140, 0, 0.5);
        }

        .bi-exclamation-triangle {
            color: var(--accent-orange);
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="error-code">404</h1>
        <h2 class="error-title">
            <i class="bi bi-exclamation-triangle"></i> Extraviado
        </h2>
        <p class="error-message">
            Al igual que un paquete sin dirección, no pudimos encontrar lo que buscabas. La página ha sido movida o no existe.
        </p>
        <a href="/" class="btn-home">
            <i class="bi bi-house-fill"></i> Volver al Centro de Control
        </a>
    </div>
</body>
</html>
