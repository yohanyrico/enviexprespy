{# templates/vehiculos.html #}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Vehículos – EnviExpress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
    :root {
        /* Paleta de colores unificada y memorizada */
        --rojo-milan: #B20C06;
        --rojo-hover: #8a0a05;
        --negro-puro: #000000;
        --blanco-puro: #ffffff;
        --fondo-gris: #f4f4f4;
        --card-bg: #ffffff; 
        --input-bg: #fdfdfd;
        
        /* Mapeo de variables de estado (EDITAR EN AZUL) */
        --btn-editar: #0d6efd;
        --btn-editar-hover: #0b5ed7;
        --btn-eliminar: var(--rojo-milan);
    }

    body { 
        background-color: var(--fondo-gris); 
        min-height: 100vh; 
        color: var(--negro-puro); 
        font-family: 'Montserrat', sans-serif; 
        padding-top: 100px; 
        margin: 0;
    }

    /* NAVBAR */
    .navbar { 
        backdrop-filter: blur(12px); 
        background: rgba(0, 0, 0, 0.9); 
        border-bottom: 3px solid var(--rojo-milan); 
    }

    /* TÍTULO EN NEGRO */
    .title-glow { 
        font-size: 2.5rem; 
        font-weight: 800; 
        color: var(--negro-puro); 
        margin-bottom: 30px; 
        text-align: center; 
        text-transform: uppercase;
    }

    /* BOTÓN NUEVO VEHÍCULO EN ROJO MILÁN */
    .btn-green { 
        background: var(--rojo-milan); 
        border: 2px solid var(--blanco-puro); 
        padding: 10px 20px; 
        color: var(--blanco-puro) !important; 
        font-weight: 700; 
        border-radius: 10px; 
        transition: .3s; 
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 4px 10px rgba(178, 12, 6, 0.2);
    }
    .btn-green:hover { 
        transform: translateY(-2px); 
        background: var(--rojo-hover); 
        box-shadow: 0 4px 15px rgba(178, 12, 6, 0.4);
        color: var(--blanco-puro);
    }

    /* CONTENEDOR DE TABLA (ESTILO CARD BLANCA) */
    .table-container { 
        background: var(--card-bg); 
        border: 1px solid rgba(0, 0, 0, 0.1); 
        border-radius: 15px; 
        padding: 30px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    /* TABLA CLARA Y TEXTOS NEGROS */
    .table { color: var(--negro-puro); background: transparent; margin-bottom: 0; }
    
    .table thead th { 
        color: var(--rojo-milan); 
        font-weight: 700; 
        border-bottom: 2px solid var(--rojo-milan) !important; 
        padding: 15px; 
        text-transform: uppercase;
        font-size: 0.85rem;
    }

    .table tbody tr { 
        border-bottom: 1px solid #eee; 
        transition: 0.3s; 
    }
    
    .table tbody tr:hover { 
        background: rgba(0, 0, 0, 0.02); 
    }

    .table tbody td { 
        padding: 12px 15px; 
        vertical-align: middle; 
        border: none; 
        color: var(--negro-puro);
    }

    /* LOGO NAVBAR EN ROJO */
    .logo-envi {
        color: var(--rojo-milan) !important;
    }

    /* BOTONES DE ACCIÓN MANTENIENDO EL ESTILO DEL PANEL DE USUARIOS */
    .action-buttons { 
        display: flex; 
        gap: 8px; 
        justify-content: center; 
    }

    .btn-edit {
        background-color: var(--btn-editar);
        color: var(--blanco-puro) !important;
        border: none;
        padding: 8px 14px;
        border-radius: 8px;
        font-weight: 600;
        transition: 0.3s;
        display: inline-flex;
        text-decoration: none;
        gap: 5px;
        align-items: center;
    }
    .btn-edit:hover {
        transform: scale(1.05);
        background-color: var(--btn-editar-hover);
        box-shadow: 0 4px 10px rgba(13, 110, 253, 0.3);
    }

    .btn-delete {
        background-color: var(--btn-eliminar);
        color: var(--blanco-puro) !important;
        border: none;
        padding: 8px 14px;
        border-radius: 8px;
        font-weight: 600;
        transition: 0.3s;
        display: inline-flex;
        text-decoration: none;
        gap: 5px;
        align-items: center;
    }
    .btn-delete:hover {
        transform: scale(1.05);
        background-color: var(--rojo-hover);
        box-shadow: 0 4px 10px rgba(178, 12, 6, 0.3);
    }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3" href="/home">
            <span class="logo-envi">ENVI</span><span class="text-light">EXPRESS</span>
        </a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div id="nav" class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto gap-3 align-items-center">
                <li class="nav-item">
                    <a href="/home" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-house-fill"></i>
                    </a>
                </li>
                <li class="nav-item">
                    <form action="/logout" method="post" style="margin:0;">
                        <button class="btn btn-danger btn-sm">
                            <i class="bi bi-box-arrow-right"></i>
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <h1 class="title-glow">
        <i class="bi bi-truck"></i> Gestión de Vehículos
    </h1>

    <div class="mb-4">
        <a class="btn btn-green" href="/vehiculos/nuevo">
            <i class="bi bi-plus-circle-fill"></i> Nuevo Vehículo
        </a>
    </div>

    <div class="table-container">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th class="text-center">ID</th>
                        <th class="text-center">Placa</th>
                        <th class="text-center">Tipo</th>
                        <th class="text-center">Capacidad</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for v in vehiculos %}
                    <tr>
                        <td class="text-center">{{ v.vehiculo_id }}</td>
                        <td class="text-center">
                            <strong>{{ v.placa }}</strong>
                        </td>
                        <td class="text-center">
                            <span class="badge bg-dark text-light">{{ v.tipo }}</span>
                        </td>
                        <td class="text-center">{{ v.capacidad_kg }} kg</td>
                        <td class="text-center">
                            <div class="action-buttons">
                                <a class="btn-edit" href="/vehiculos/editar/{{ v.vehiculo_id }}">
                                    <i class="bi bi-pencil-fill"></i> Editar
                                </a>
                                <a class="btn-delete" href="/vehiculos/eliminar/{{ v.vehiculo_id }}" 
                                   onclick="return confirm('¿Está seguro de eliminar este vehículo?')">
                                    <i class="bi bi-trash-fill"></i> Eliminar
                                </a>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
