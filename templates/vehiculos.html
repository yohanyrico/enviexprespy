{# templates/vehiculos.html #}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Vehículos – EnviExpress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
    :root {
        --azul-profundo: #002B5B;
        --azul-medio: #004085;
        --azul-oscuro: #001a33;
        --naranja: #FF8C00;
        --naranja-hover: #E67E00;
        --blanco: #000000;
        --azul-celeste: #0066ff;
        --btn-editar: #0d6efd;
        --btn-eliminar: #dc3545;
    }

    body { 
        background: linear-gradient(135deg, var(--azul-profundo), var(--azul-medio), var(--azul-oscuro)); 
        min-height: 100vh; 
        color: var(--blanco); 
        font-family: 'Montserrat', sans-serif; 
        padding-top: 80px; 
        margin: 0;
    }

    /* NAVBAR */
    .navbar { 
        backdrop-filter: blur(12px); 
        background: rgba(0, 26, 51, 0.4); 
        border-bottom: 2px solid var(--naranja); 
    }

    /* TÍTULO */
    .title-glow { 
        font-size: 2.5rem; 
        font-weight: 800; 
        color: var(--blanco); 
        margin-bottom: 30px; 
        text-align: center; 
        text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    /* BOTÓN NUEVO VEHÍCULO */
    .btn-green { 
        background: var(--naranja); 
        border: none; 
        padding: 10px 20px; 
        color: white; 
        font-weight: 700; 
        border-radius: 10px; 
        transition: .3s; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .btn-green:hover { 
        transform: scale(1.05); 
        background: var(--naranja-hover); 
        box-shadow: 0 6px 15px rgba(255, 140, 0, 0.4);
        color: white;
    }

    /* CONTENEDOR DE TABLA */
    .table-container { 
        background: rgba(255, 255, 255, 0.05); 
        border: 1px solid rgba(255, 255, 255, 0.15); 
        border-radius: 15px; 
        padding: 30px; 
        backdrop-filter: blur(15px); 
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    /* TABLA */
    .table { color: var(--blanco); background: transparent; }
    
    .table thead { 
        background: rgba(255, 255, 255, 0.1); 
        border-bottom: 2px solid var(--naranja); 
    }
    
    .table thead th { 
        color: var(--naranja); 
        font-weight: 700; 
        border: none; 
        padding: 15px; 
        text-transform: uppercase;
        font-size: 0.9rem;
    }

    .table tbody tr { 
        border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        transition: 0.3s; 
    }
    
    .table tbody tr:hover { 
        background: rgba(255, 255, 255, 0.05); 
    }

    .table tbody td { 
        padding: 15px; 
        vertical-align: middle; 
        border: none; 
        color: var(--blanco); /* Ajustado para legibilidad */
    }

    /* BADGE */
    .badge { 
        padding: 8px 15px; 
        border-radius: 20px; 
        font-weight: 600; 
    }

    /* BOTONES DE ACCIÓN - PERSONALIZADOS */
    .action-buttons { 
        display: flex; 
        gap: 8px; 
        justify-content: center; 
    }

    .btn-edit {
        background-color: var(--btn-editar);
        color: white !important;
        border: none;
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 0.85rem;
        font-weight: 700;
        transition: 0.3s;
        text-decoration: none;
    }
    .btn-edit:hover {
        background-color: #0b5ed7;
        transform: scale(1.1);
        box-shadow: 0 0 12px rgba(13, 110, 253, 0.5);
    }

    .btn-delete {
        background-color: var(--btn-eliminar);
        color: white !important;
        border: none;
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 0.85rem;
        font-weight: 700;
        transition: 0.3s;
        text-decoration: none;
    }
    .btn-delete:hover {
        background-color: #bb2d3b;
        transform: scale(1.1);
        box-shadow: 0 0 12px rgba(220, 53, 69, 0.5);
    }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3 text-success" href="/home">
            ENVI<span class="text-light">EXPRESS</span>
        </a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div id="nav" class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto gap-3 align-items-center">
                <li class="nav-item">
                    <a href="/home" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-house-fill"></i>
                    </a>
                </li>
                <li class="nav-item">
                    <form action="/logout" method="post" style="margin:0;">
                        <button class="btn btn-danger btn-sm">
                            <i class="bi bi-box-arrow-right"></i>
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <h1 class="title-glow">
        <i class="bi bi-truck"></i> Gestión de Vehículos
    </h1>

    <div class="mb-4">
        <a class="btn btn-green" href="/vehiculos/nuevo">
            <i class="bi bi-plus-circle-fill"></i> Nuevo Vehículo
        </a>
    </div>

    <div class="table-container">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th class="text-center">ID</th>
                        <th class="text-center">Placa</th>
                        <th class="text-center">Tipo</th>
                        <th class="text-center">Capacidad</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for v in vehiculos %}
                    <tr>
                        <td class="text-center">{{ v.vehiculo_id }}</td>
                        <td class="text-center">
                            <strong>{{ v.placa }}</strong>
                        </td>
                        <td class="text-center">
                            <span class="badge bg-info text-dark">{{ v.tipo }}</span>
                        </td>
                        <td class="text-center">{{ v.capacidad_kg }} kg</td>
                        <td class="text-center">
                            <div class="action-buttons">
                                <a class="btn-edit" href="/vehiculos/editar/{{ v.vehiculo_id }}">
                                    <i class="bi bi-pencil-fill"></i> Editar
                                </a>
                                <a class="btn-delete" href="/vehiculos/eliminar/{{ v.vehiculo_id }}" 
                                    onclick="return confirm('¿Está seguro de eliminar este vehículo?')">
                                    <i class="bi bi-trash-fill"></i> Eliminar
                                </a>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
