{# templates/mapa_operativo.html #}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificación Operativa | EnviExpress</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-oscuro: #001a33;
            --azul-navy: #002b5b;
            --naranja: #ff8c00;
            --blanco: #ffffff;
        }

        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: 'Montserrat', sans-serif; }
        .main-wrapper { display: flex; width: 100%; height: 100vh; }

        #map { flex: 1; height: 100%; background: var(--azul-oscuro); position: relative; }

        /* PANEL LATERAL */
        #side-panel {
            width: 320px; background: var(--blanco); border-left: 3px solid var(--naranja);
            display: flex; flex-direction: column; box-shadow: -4px 0 15px rgba(0,0,0,0.2); z-index: 1001;
        }
        .panel-header { padding: 20px; background: var(--azul-navy); color: white; text-align: center; }
        .panel-header h5 { margin: 0; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        
        #lista-rutas { flex: 1; overflow-y: auto; padding: 15px; background: #f4f7f6; }
        
        .ruta-card {
            background: var(--blanco); border-left: 5px solid var(--naranja); padding: 15px;
            margin-bottom: 12px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            cursor: pointer; transition: 0.3s;
        }
        .ruta-card:hover { transform: translateX(5px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
        .ruta-card b { color: var(--azul-navy); display: block; margin-bottom: 5px; }
        .ruta-card span { font-size: 0.85rem; color: #555; font-weight: 500; }

        /* TOOLBAR SUPERIOR */
        .header-tool { 
            position: absolute; top: 15px; left: 20px; z-index: 1000; 
            background: var(--blanco); padding: 12px 25px; border-radius: 50px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.3); display: flex; gap: 15px; align-items: center; border: 1px solid #eee;
        }
        .filter-btn {
            background: #f8f9fa; border: 2px solid; padding: 8px 16px; 
            border-radius: 20px; cursor: pointer; font-weight: 800; transition: 0.3s; font-size: 0.8rem;
        }
        .btn-c { border-color: #FFD700; color: #b8860b; }
        .btn-d { border-color: #007bff; color: #0056b3; }
        .btn-off { opacity: 0.3; background: #ddd !important; border-color: #999 !important; color: #666 !important; }

        .calendar-box {
            display: flex; align-items: center; gap: 10px;
            background: #f1f3f5; padding: 5px 15px; border-radius: 25px;
        }
        .date-input { border: none; background: transparent; font-weight: 700; font-size: 0.85rem; color: var(--azul-navy); outline: none; }

        /* ICONOS MAPA */
        .pin { display: flex; align-items: center; justify-content: center; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); width: 32px; height: 32px; border: 2px solid white; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); }
        .pin span { transform: rotate(45deg); color: white; font-weight: 900; font-size: 14px; }
        .bg-c { background: #FFD700; } /* Gold para Origen */
        .bg-d { background: #007bff; } /* Blue para Destino */

        /* PANEL ASIGNACIÓN */
        .assignment-panel { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-70%); 
            z-index: 1000; background: rgba(0, 43, 91, 0.95); padding: 18px 30px; 
            border-radius: 20px; border: 2px solid var(--naranja); color: white;
            display: flex; gap: 20px; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }
        .assignment-panel select { padding: 10px; border-radius: 8px; font-weight: 600; border: none; min-width: 180px; }
        .btn-asignar { background: var(--naranja); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-asignar:hover { background: #e67e00; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="header-tool">
            <a href="/envios" style="text-decoration:none; color:var(--azul-navy); display:flex; align-items:center; gap:8px;">
                <i class="bi bi-arrow-left-circle-fill" style="font-size: 1.8rem;"></i>
                <b style="letter-spacing: 1px;">SALIR</b>
            </a>
            <div style="width: 1px; height: 30px; background: #ddd;"></div>
            <button class="filter-btn btn-c" id="btnC" onclick="toggleLayer('c')">ORIGEN (C)</button>
            <button class="filter-btn btn-d" id="btnD" onclick="toggleLayer('d')">DESTINO (D)</button>
            
            <div class="calendar-box">
                <i class="bi bi-calendar-check" style="color: var(--naranja);"></i>
                <input type="date" id="dateStart" class="date-input" title="Fecha inicio">
                <i class="bi bi-arrow-right-short"></i>
                <input type="date" id="dateEnd" class="date-input" title="Fecha fin">
                <button onclick="aplicarFiltros()" style="background:var(--azul-navy); color:white; border:none; padding:6px 15px; border-radius:15px; cursor:pointer; font-weight:bold; margin-left:10px;">FILTRAR</button>
            </div>
        </div>

        <div id="map"></div>

        <div id="side-panel">
            <div class="panel-header">
                <h5>Rutas en Curso</h5>
            </div>
            <div id="lista-rutas">
                {% for m in rutas_activas %}
                <div class="ruta-card" onclick="window.location.href='/envios/ver-ruta/{{ m.id_usuario }}'">
                    <b><i class="bi bi-bicycle"></i> {{ m.nombre }} {{ m.apellido }}</b>
                    <span>Estado: <span class="badge bg-success">Activo</span></span>
                    <div class="text-end mt-2">
                        <small class="text-primary fw-bold">Gestionar <i class="bi bi-arrow-right"></i></small>
                    </div>
                </div>
                {% else %}
                <div class="text-center py-5">
                    <i class="bi bi-map-fill" style="font-size: 3rem; color: #ccc;"></i>
                    <p style="color:#999; margin-top:10px;">No hay rutas hoy.</p>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <div class="assignment-panel">
        <div>Pedidos Seleccionados: <b id="totalPuntos" style="color:var(--naranja); font-size:1.5rem;">0</b></div>
        <select id="mensajeroSelect">
            <option value="">-- Seleccionar Mensajero --</option>
            {% for m in mensajeros %}
                <option value="{{ m.id_usuario }}">
                    {{ m.nombre }} {{ m.apellido }}
                </option>
            {% endfor %}
        </select>
        <button class="btn-asignar" onclick="confirmarRuta()">ASIGNAR AHORA</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

    <script>
        // Inicialización del Mapa centrado en Bogotá
        var map = L.map('map', { zoomControl: false }).setView([4.65, -74.10], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
            attribution: '&copy; EnviExpress Logística' 
        }).addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        const layerC = L.layerGroup().addTo(map);
        const layerD = L.layerGroup().addTo(map);
        const drawnItems = new L.FeatureGroup().addTo(map);
        const todosMarcadores = [];

        function crearIcono(letra, colorClass) {
            return L.divIcon({ 
                className: '', 
                html: `<div class="pin ${colorClass}"><span>${letra}</span></div>`, 
                iconSize: [32, 32], 
                iconAnchor: [16, 32] 
            });
        }

        // Carga de datos dinámica de Jinja2
        {% for e in envios %}
            {% set f_iso = e.fecha_creacion.date().isoformat() if e.fecha_creacion else '' %}
            
            {% if e.lugar_recogida and e.lugar_recogida.latitud %}
                todosMarcadores.push(L.marker([{{ e.lugar_recogida.latitud }}, {{ e.lugar_recogida.longitud }}], { 
                    icon: crearIcono('C', 'bg-c'), 
                    envioId: {{ e.envio_id }}, 
                    fecha: "{{ f_iso }}", 
                    tipo: 'c' 
                }).bindPopup("<b>Guía: {{ e.numero_guia }}</b><br>Origen: {{ e.lugar_recogida.direccion }}"));
            {% endif %}

            {% if e.lugar_entrega and e.lugar_entrega.latitud %}
                todosMarcadores.push(L.marker([{{ e.lugar_entrega.latitud }}, {{ e.lugar_entrega.longitud }}], { 
                    icon: crearIcono('D', 'bg-d'), 
                    envioId: {{ e.envio_id }}, 
                    fecha: "{{ f_iso }}", 
                    tipo: 'd' 
                }).bindPopup("<b>Guía: {{ e.numero_guia }}</b><br>Destino: {{ e.lugar_entrega.direccion }}"));
            {% endif %}
        {% endfor %}

        let showC = true, showD = true;

        function aplicarFiltros() {
            const start = document.getElementById('dateStart').value;
            const end = document.getElementById('dateEnd').value;
            
            layerC.clearLayers(); 
            layerD.clearLayers();
            
            let idsUnicosVisibles = new Set();

            todosMarcadores.forEach(m => {
                const cumpleTipo = (m.options.tipo === 'c' && showC) || (m.options.tipo === 'd' && showD);
                
                let cumpleFecha = true;
                if (start && m.options.fecha < start) cumpleFecha = false;
                if (end && m.options.fecha > end) cumpleFecha = false;

                if (cumpleTipo && cumpleFecha) {
                    if (m.options.tipo === 'c') m.addTo(layerC); 
                    else m.addTo(layerD);
                    idsUnicosVisibles.add(m.options.envioId);
                }
            });

            document.getElementById('totalPuntos').innerText = idsUnicosVisibles.size;
        }

        function toggleLayer(tipo) {
            if (tipo === 'c') { 
                showC = !showC; 
                document.getElementById('btnC').classList.toggle('btn-off', !showC); 
            } else { 
                showD = !showD; 
                document.getElementById('btnD').classList.toggle('btn-off', !showD); 
            }
            aplicarFiltros();
        }

        // Configuración de Herramientas de Dibujo
        const drawControl = new L.Control.Draw({
            draw: { 
                polyline: false, circle: false, marker: false, circlemarker: false,
                polygon: { shapeOptions: { color: '#ff8c00' } }, 
                rectangle: { shapeOptions: { color: '#ff8c00' } } 
            },
            edit: { featureGroup: drawnItems }
        });
        map.addControl(drawControl);

        map.on(L.Draw.Event.CREATED, (e) => { 
            drawnItems.clearLayers(); 
            drawnItems.addLayer(e.layer); 
            calcularSeleccionDibujo(e.layer);
        });

        function calcularSeleccionDibujo(layer) {
            let idsSeleccionados = new Set();
            const bounds = layer.getBounds();

            [layerC, layerD].forEach(group => {
                group.eachLayer(m => {
                    if (bounds.contains(m.getLatLng())) {
                        idsSeleccionados.add(m.options.envioId);
                    }
                });
            });
            document.getElementById('totalPuntos').innerText = idsSeleccionados.size;
        }

        function confirmarRuta() {
            const mId = document.getElementById('mensajeroSelect').value;
            if (!mId) return alert("Por favor, selecciona un mensajero.");

            let idsSet = new Set();
            
            // Si hay un dibujo activo, filtramos por área
            if (drawnItems.getLayers().length > 0) {
                let area = drawnItems.getLayers()[0];
                [layerC, layerD].forEach(group => {
                    group.eachLayer(m => { 
                        if (area.getBounds().contains(m.getLatLng())) idsSet.add(m.options.envioId); 
                    });
                });
            } else {
                // Si no hay dibujo, tomamos todo lo que es visible según filtros
                layerC.eachLayer(m => idsSet.add(m.options.envioId));
                layerD.eachLayer(m => idsSet.add(m.options.envioId));
            }

            if (idsSet.size === 0) return alert("No hay pedidos seleccionados para asignar.");
            
            const arrayIds = Array.from(idsSet);

            if (!confirm(`¿Asignar ${arrayIds.length} envíos al mensajero seleccionado?`)) return;

            fetch("/envios/asignar-mensajero-masivo", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ envio_ids: arrayIds, id_mensajero: mId })
            })
            .then(res => {
                if(res.ok) {
                    alert("¡Ruta asignada exitosamente!");
                    location.reload();
                } else {
                    alert("Error al asignar la ruta.");
                }
            });
        }

        window.onload = aplicarFiltros;
    </script>
</body>
</html>
